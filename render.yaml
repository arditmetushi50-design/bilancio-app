services:
  - type: web
    name: bilancio-personale
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build && rm -rf ../backend/static && cp -r dist ../backend/static"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.0"
